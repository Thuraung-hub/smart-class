name: smart_class
description: Smart Class Check-in & Reflection App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Local storage
  shared_preferences: ^2.2.2

  # GPS location
  geolocator: ^11.0.0

  # Date formatting
  intl: ^0.19.0

  # Generate unique IDs
  uuid: ^4.3.3

  # QR code scanning
  mobile_scanner: ^5.1.1

  # Permissions
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true